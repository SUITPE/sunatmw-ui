<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" fill="none">
  <!-- SUIT Logo v2 - Full (Icon + Text) - Cyan rebrand -->
  <!-- Icon -->
  <g id="icon">
    <rect x="4" y="4" width="48" height="56" rx="8" fill="#00BFD6"/>
    <rect x="14" y="16" width="28" height="3" rx="1.5" fill="#B2F5EA"/>
    <rect x="14" y="24" width="22" height="3" rx="1.5" fill="#B2F5EA"/>
    <rect x="14" y="32" width="28" height="3" rx="1.5" fill="#B2F5EA"/>
    <path d="M22 42 L27 47 L38 36" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  <!-- Text: suIT -->
  <g id="text">
    <text x="72" y="44" font-family="Urbanist, system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" letter-spacing="-0.02em" fill="#2E2C2B">
      <tspan fill="#2E2C2B">su</tspan><tspan fill="#00BFD6">IT</tspan>
    </text>
  </g>
  <!-- Tagline -->
  <text x="72" y="58" font-family="Urbanist, system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" letter-spacing="0.08em" fill="#64748B">
    SOLUCIONES DE NEGOCIO
  </text>
</svg>
